<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Sismos | Control de Misión</title>
    
    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Geist:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        surface: "#131313",
                        "surface-dim": "#0e0e0e",
                        "surface-bright": "#1c1b1b",
                        "surface-container": "#201f1f",
                        "surface-container-high": "#2a2a2a",
                        "surface-container-highest": "#353534",
                        "surface-variant": "#353534",
                        primary: "#ffb5a0",
                        "primary-container": "#ff5722",
                        "on-primary": "#5f1500",
                        "on-primary-container": "#541200",
                        secondary: "#70d8c8",
                        "secondary-container": "#32a192",
                        "on-secondary": "#003731",
                        tertiary: "#a2c9ff",
                        "tertiary-container": "#3394f2",
                        "on-tertiary": "#00315b",
                        error: "#ffb4ab",
                        "error-container": "#93000a",
                        "on-error": "#690005",
                        outline: "#ab8980",
                        "outline-variant": "#5b4039",
                        "on-surface": "#e5e2e1",
                        "on-surface-variant": "#e4beb4",
                        "inverse-surface": "#e5e2e1",
                        "inverse-on-surface": "#313030",
                        background: "#131313",
                        "on-background": "#e5e2e1",
                    },
                    fontFamily: {
                        display: ["Geist", "sans-serif"],
                        body: ["Inter", "sans-serif"],
                        mono: ["JetBrains Mono", "monospace"],
                    },
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body class="bg-surface text-on-surface font-body overflow-hidden h-screen">

    <!-- Contenedor Principal -->
    <div id="app" class="flex h-screen w-screen overflow-hidden">
        
        <!-- Barra Lateral -->
        <aside id="sidebar" class="sidebar flex flex-col h-full w-[260px] bg-surface-bright border-r border-outline-variant/30 shrink-0 transition-all duration-500 ease-out translate-x-0">
            
            <!-- Logo / Marca -->
            <div class="px-6 pt-8 pb-6">
                <div class="flex items-center gap-3 mb-1">
                    <div class="w-9 h-9 rounded-lg bg-primary-container flex items-center justify-center">
                        <span class="material-symbols-outlined text-on-primary text-lg">vibration</span>
                    </div>
                    <div>
                        <h1 class="font-display font-bold text-lg text-primary tracking-tight leading-none">Calculadora Sismos</h1>
                        <p class="text-[10px] text-on-surface-variant/60 font-mono uppercase tracking-widest">v1</p>
                    </div>
                </div>
            </div>
            
            <!-- Navegación -->
            <nav class="flex-1 px-3 space-y-1">
                <button onclick="router.navigate('dashboard')" data-route="dashboard" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface transition-all duration-300 group">
                    <span class="material-symbols-outlined text-lg transition-transform duration-300 group-hover:scale-110">dashboard</span>
                    <span class="font-medium text-sm">Panel Principal</span>
                    <div class="nav-indicator ml-auto w-1.5 h-1.5 rounded-full bg-primary opacity-0 transition-all duration-300"></div>
                </button>
                
                <button onclick="router.navigate('data')" data-route="data" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface transition-all duration-300 group">
                    <span class="material-symbols-outlined text-lg transition-transform duration-300 group-hover:scale-110">dataset</span>
                    <span class="font-medium text-sm">Ingesta de Datos</span>
                    <div class="nav-indicator ml-auto w-1.5 h-1.5 rounded-full bg-primary opacity-0 transition-all duration-300"></div>
                </button>
                
                <button onclick="router.navigate('prediction')" data-route="prediction" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface transition-all duration-300 group">
                    <span class="material-symbols-outlined text-lg transition-transform duration-300 group-hover:scale-110">query_stats</span>
                    <span class="font-medium text-sm">Predicción</span>
                    <div class="nav-indicator ml-auto w-1.5 h-1.5 rounded-full bg-primary opacity-0 transition-all duration-300"></div>
                </button>
                
                <button onclick="router.navigate('results')" data-route="results" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface transition-all duration-300 group">
                    <span class="material-symbols-outlined text-lg transition-transform duration-300 group-hover:scale-110">analytics</span>
                    <span class="font-medium text-sm">Resultados</span>
                    <div class="nav-indicator ml-auto w-1.5 h-1.5 rounded-full bg-primary opacity-0 transition-all duration-300"></div>
                </button>
            </nav>
            
            <!-- Widget de Estado del Modelo -->
            <div class="px-4 pb-4">
                <div id="training-widget" class="bg-surface-container rounded-lg p-4 border border-outline-variant/20 opacity-0 translate-y-4 transition-all duration-500">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="w-2 h-2 rounded-full bg-secondary animate-pulse"></span>
                        <span class="text-[10px] font-mono text-secondary uppercase tracking-wider">Estado del Modelo</span>
                    </div>
                    <div class="w-full bg-surface-container-highest rounded-full h-1.5 mb-2 overflow-hidden">
                        <div id="training-progress" class="h-full bg-secondary rounded-full w-0 transition-all duration-1000"></div>
                    </div>
                    <p id="training-status" class="text-[10px] text-on-surface-variant/60 font-mono">Sin modelo cargado</p>
                </div>
            </div>
            
            <!-- Usuario / Inferior -->
            <div class="px-4 pb-6">
                <div class="flex items-center gap-3 px-4 py-3 rounded-lg bg-surface-container/50 border border-outline-variant/20">
                    <div class="w-8 h-8 rounded-full bg-primary-container/30 flex items-center justify-center">
                        <span class="material-symbols-outlined text-primary text-sm">person</span>
                    </div>
                    <div>
                        <p class="text-xs font-medium text-on-surface">Analista Principal</p>
                        <p class="text-[10px] text-on-surface-variant/50 font-mono">Laboratorio de Investigación</p>
                    </div>
                </div>
            </div>
        </aside>
        
        <!-- Área de Contenido Principal -->
        <main class="flex-1 flex flex-col min-w-0 overflow-hidden relative">
            
            <!-- Barra Superior -->
            <header class="h-16 border-b border-outline-variant/20 bg-surface/80 backdrop-blur-xl flex items-center justify-between px-8 shrink-0 z-20">
                <div class="flex items-center gap-4">
                    <button id="sidebar-toggle" class="lg:hidden p-2 rounded-lg hover:bg-surface-container-high transition-colors">
                        <span class="material-symbols-outlined">menu</span>
                    </button>
                    <div class="flex items-center gap-2">
                        <span id="page-icon" class="material-symbols-outlined text-primary">dashboard</span>
                        <h2 id="page-title" class="font-display font-semibold text-lg">Panel Principal</h2>
                    </div>
                </div>
                
                <div class="flex items-center gap-4">
                    <!-- Indicador en vivo -->
                    <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-surface-container-high border border-outline-variant/20">
                        <span class="relative flex h-2 w-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-secondary opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-secondary"></span>
                        </span>
                        <span class="text-[10px] font-mono text-secondary uppercase tracking-wider">En Vivo</span>
                    </div>
                    
                    <div class="h-6 w-px bg-outline-variant/30"></div>
                    
                    <span class="material-symbols-outlined text-on-surface-variant hover:text-primary cursor-pointer transition-colors p-2 rounded-lg hover:bg-surface-container-high">sync</span>
                    <span class="material-symbols-outlined text-on-surface-variant hover:text-primary cursor-pointer transition-colors p-2 rounded-lg hover:bg-surface-container-high">settings</span>
                </div>
            </header>
            
            <!-- Contenedor de Contenido -->
            <div id="content-area" class="flex-1 overflow-y-auto overflow-x-hidden relative">
                <div id="content" class="p-8 max-w-[1600px] mx-auto min-h-full">
                    <!-- Contenido cargado dinámicamente -->
                </div>
            </div>
            
        </main>
    </div>
    
    <!-- Overlay de Carga -->
    <div id="loading-overlay" class="fixed inset-0 bg-surface/90 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="flex flex-col items-center gap-4">
            <div class="relative w-12 h-12">
                <div class="absolute inset-0 border-2 border-outline-variant/30 rounded-full"></div>
                <div class="absolute inset-0 border-2 border-primary border-t-transparent rounded-full animate-spin"></div>
            </div>
            <p class="text-sm text-on-surface-variant font-mono animate-pulse">Cargando...</p>
        </div>
    </div>
    
    <!-- Contenedor de Notificaciones -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2 pointer-events-none"></div>
    
    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/animations.js') }}"></script>
    <script src="{{ url_for('static', filename='js/router.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
